<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Research 2.0</title>
  <style>
    body{font-family:Arial;margin:0;padding-bottom:80px;background:#f5f5f5}
  .header{background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 4px rgba(0,0,0,.1);position:sticky;top:0}
  .menu-btn{font-size:24px;cursor:pointer;padding:8px;border:none;background:none}
  .logo{font-weight:bold;font-size:18px;color:#6a1b9a}
  .sidebar{position:fixed;left:-300px;top:0;width:280px;height:100%;background:#fff;box-shadow:2px 0 8px rgba(0,0,0,.2);transition:.3s;z-index:200;overflow-y:auto}
  .sidebar.active{left:0}
  .sidebar-header{padding:20px;background:#6a1b9a;color:#fff;font-weight:bold}
  .class-item{padding:16px 20px;border-bottom:1px solid #eee;cursor:pointer;font-weight:600}
  .subject-list,.chapter-list{display:none}
  .subject-item{padding:12px 20px 12px 35px;border-bottom:1px solid #eee;cursor:pointer;background:#f9f9f9}
  .chapter-item{padding:10px 20px 10px 50px;border-bottom:1px solid #eee;cursor:pointer;background:#f3e5f5;font-size:14px}
  .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;z-index:150}
  .overlay.active{display:block}
  .box{background:#fff;padding:20px;border-radius:12px;margin:16px;max-width:800px;margin-left:auto;margin-right:auto}
  .btn{background:#6a1b9a;color:#fff;padding:14px;text-align:center;border-radius:8px;margin:10px 0;cursor:pointer;font-weight:bold;border:none;width:100%}
  .answer{margin-top:16px;padding:16px;background:#f3e5f5;border-radius:8px;line-height:1.6;display:none}
  .chat{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px;box-shadow:0 -2px 10px rgba(0,0,0,.1);display:flex;gap:8px;max-width:800px;margin:auto}
  .chat input{flex:1;padding:14px;border:2px solid #6a1b9a;border-radius:25px;font-size:16px;outline:none}
  .chat button{background:#6a1b9a;color:#fff;border:none;padding:0 20px;border-radius:25px;font-weight:bold;cursor:pointer}
  </style>
</head>
<body>
  <div class="header">
    <button class="menu-btn" onclick="openMenu()">☰</button>
    <div class="logo">Study Research 2.0</div>
    <div style="width:40px"></div>
  </div>

  <div class="overlay" id="overlay" onclick="closeMenu()"></div>
  
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">NCERT 9th, 10th, 12th</div>
    <div class="class-item" onclick="showSub('c9')">Class 9th</div>
    <div id="c9" class="subject-list">
      <div class="subject-item" onclick="showChap('c9h')">Hindi</div>
      <div id="c9h" class="chapter-list">
        <div class="chapter-item" onclick="openChap('Class 9 Hindi','Ch 1 - दो बैलों की कथा')">Ch 1 - दो बैलों की कथा</div>
      </div>
    </div>
    <div class="class-item" onclick="showSub('c10')">Class 10th</div>
    <div id="c10" class="subject-list">
      <div class="subject-item" onclick="showChap('c10s')">Science</div>
      <div id="c10s" class="chapter-list">
        <div class="chapter-item" onclick="openChap('Class 10 Science','Ch 1 - Chemical Reactions')">Ch 1 - Chemical Reactions</div>
      </div>
    </div>
    <div class="class-item" onclick="showSub('c12')">Class 12th</div>
    <div id="c12" class="subject-list">
      <div class="subject-item" onclick="showChap('c12e')">English</div>
      <div id="c12e" class="chapter-list">
        <div class="chapter-item" onclick="openChap('Class 12 English','Ch 1 - My Mother at Sixty Six')">Ch 1 - My Mother at Sixty Six</div>
      </div>
    </div>
  </div>

  <div class="box" id="home">
    <h2 style="color:#6a1b9a">Study Research 2.0</h2>
    <p style="color:#666;margin-top:8px">☰ Menu dabao ya neeche sawal likho</p>
    <p style="color:#666;margin-top:4px">Class 9, 10, 12 - NCERT Solutions</p>
  </div>

  <div class="box" id="content" style="display:none">
    <h3 id="title" style="color:#6a1b9a"></h3>
    <button class="btn" onclick="showAns('imp')">📝 IMP Questions</button>
    <button class="btn" onclick="showAns('mcq')">✅ MCQ Questions</button>
    <button class="btn" onclick="showAns('summary')">📖 Chapter Summary</button>
    <div id="answer" class="answer"></div>
  </div>

  <div class="chat">
    <input type="text" id="q" placeholder="Koi bhi sawal pucho...">
    <button onclick="ask()">Ask</button>
  </div>

<script>
const data = {
  "Class 9 Hindi|Ch 1 - दो बैलों की कथा": {
    imp: "1. हीरा और मोती की मित्रता की क्या विशेषताएँ थीं?<br>2. गया ने बैलों के साथ कैसा व्यवहार किया?<br>3. कहानी का उद्देश्य क्या है?",
    mcq: "1. 'दो बैलों की कथा' के लेखक कौन हैं?<br>a) प्रेमचंद b) प्रसाद<br><b>Ans: a) प्रेमचंद</b>",
    summary: "प्रेमचंद की यह कहानी हीरा-मोती नामक दो बैलों की अटूट मित्रता की है। गया निर्दयी था। अंत में दोनों बैल भागकर अपने मालिक झूरी के पास लौट आते हैं।"
  },
  "Class 10 Science|Ch 1 - Chemical Reactions": {
    imp: "1. What is a balanced chemical equation?<br>2. Give 2 examples of decomposition reactions.",
    mcq: "1. 2H2 + O2 → 2H2O is which type?<br>a) Combination b) Decomposition<br><b>Ans: a) Combination</b>",
    summary: "Chemical reactions ke types: Combination, Decomposition, Displacement, Double Displacement, Redox. Exothermic heat release karta hai."
  },
  "Class 12 English|Ch 1 - My Mother at Sixty Six": {
    imp: "1. What is the central theme?<br>2. Explain 'familiar ache'.",
    mcq: "1. Who is the poet?<br>a) Kamala Das b) Robert Frost<br><b>Ans: a) Kamala Das</b>",
    summary: "Poet Kamala Das maa ke budhape aur apne darr ke baare me batati hai. Young trees aur children dekh kar dhyaan batati hai. Theme: Aging, Fear of Loss."
  }
};

let current = '';

function openMenu(){
  document.getElementById('sidebar').classList.add('active');
  document.getElementById('overlay').classList.add('active');
}
function closeMenu(){
  document.getElementById('sidebar').classList.remove('active');
  document.getElementById('overlay').classList.remove('active');
}
function showSub(id){
  let el = document.getElementById(id);
  el.style.display = el.style.display==='block'?'none':'block';
}
function showChap(id){
  let el = document.getElementById(id);
  el.style.display = el.style.display==='block'?'none':'block';
}
function openChap(sub,chap){
  closeMenu();
  document.getElementById('home').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('title').innerText = sub + ' - ' + chap;
  document.getElementById('answer').style.display='none';
  current = sub + '|' + chap;
}
function showAns(type){
  let ans = document.getElementById('answer');
  let d = data[current];
  if(d && d[type]){
    ans.innerHTML = '<b>'+type.toUpperCase()+':</b><br><br>'+d[type];
  }else{
    ans.innerHTML = '<b>Content Coming Soon!</b><br>24 ghante me add ho jayega.';
  }
  ans.style.display='block';
}
function ask(){
  let q = document.getElementById('q').value.toLowerCase();
  if(!q) return;
  let a = '';
  if(q.includes('hello')||q.includes('hi')){
    a = 'Hello Bhai! Menu se chapter select karo ya sawal pucho.';
  }else if(q.includes('newton')){
    a = '<b>Newton ke 3 Laws:</b><br>1. Inertia<br>2. F=ma<br>3. Action-Reaction';
  }else if(q.includes('photo')||q.includes('prkash')){
    a = '<b>Photosynthesis:</b><br>6CO2 + 6H2O → C6H12O6 + 6O2<br>Plants sunlight se food banate hain.';
  }else{
    a = '<b>Bhai ye sawal database me nahi hai.</b><br><br>Sach: Github pe free me ChatGPT jaisa nahi ban sakta. Uske liye ₹800/month ka OpenAI API chahiye.<br><br>Menu se chapter kholo ya Telegram @StudyResearch2_0 pe pucho.';
  }
  document.getElementById('home').style.display='none';
  document.getElementById('content').style.display='block';
  document.getElementById('title').innerText = 'AI Answer';
  document.getElementById('answer').innerHTML = a;
  document.getElementById('answer').style.display='block';
  document.getElementById('q').value='';
}
document.getElementById('q').addEventListener('keypress',function(e){
  if(e.key==='Enter') ask();
});
</script>
</body>
</html>
